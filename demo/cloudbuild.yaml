steps:
  # Build Docker Image
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-image'
  args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity:${SHORT_SHA}', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity:latest', '.']
  dir: 'demo'

  # Push Docker Image (SHA Tag)
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-sha-tag'
  args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity:${SHORT_SHA}']
  waitFor: ['build-image']

  # Push Docker Image (Latest Tag)
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-latest-tag'
  args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity:latest']
  waitFor: ['build-image']

  # Trigger Deployment Pipeline via Pub/Sub
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'trigger-deployment'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    gcloud pubsub topics publish unity-image-built \
      --message='{"_COMMIT_SHA":"${SHORT_SHA}","_REPO_PATTERN":"${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity"}'
  waitFor: ['push-sha-tag', 'push-latest-tag']

# Substitution variables
substitutions:
  _REGION: 'us-central1'  # Change to your preferred region
  _REPOSITORY: 'unity'  # Change to your Artifact Registry repository name

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'  # Use a more powerful machine for faster builds

# Timeout
timeout: '1200s'  # 20 minutes

# Images to be pushed (for Cloud Build history)
images:
- '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity:${SHORT_SHA}'
- '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity:latest'
