    #       --region=${_REGION} \
    #       --format="value(spec.template.spec.template.spec.containers[0].image)")
        
    #     echo "  Current image: $$CURRENT_IMAGE"
    #     echo "  New image: ${_IMAGE_URI}"
        
    #     # COMMENTED OUT FOR TESTING - Update the job with the new image
    #     gcloud run jobs update "$$JOB_NAME" \
    #       --image=${_IMAGE_URI} \
    #       --region=${_REGION} \
    #       --quiet
        
    #     if [ $$? -eq 0 ]; then
    #       echo "âś… Successfully updated job: $$JOB_NAME"
    #     else
    #       echo "âťŚ Failed to update job: $$JOB_NAME"
    #       exit 1
    #     fi
        
    #     echo "đź”Ť Would update job: $$JOB_NAME (update commented out for testing)"
    #   fi
    # done
    
    echo "đźŽ‰ Job discovery completed successfully! (No actual updates performed)"

  # Verify Deployments and Show Updated Job Images
