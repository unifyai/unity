steps:
  # Parse Pub/Sub Message and Log Deployment Info
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'parse-deployment-info'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "=== DEPLOYMENT DEBUG INFO ==="

    # Construct the full image URI from repo pattern and commit SHA
    NEW_IMAGE_URI="${_REPO_PATTERN}:${_COMMIT_SHA}"
    echo "Deployment triggered for image: $$NEW_IMAGE_URI"
    echo "Commit SHA: ${_COMMIT_SHA}"
    echo "Project ID: ${PROJECT_ID}"

    # Extract region from repo pattern (format: region-docker.pkg.dev/...)
    TARGET_REGION=$$(echo "${_REPO_PATTERN}" | sed 's/-docker\.pkg\.dev.*//')
    echo "Region (extracted): $$TARGET_REGION"
    echo "Repo Pattern: ${_REPO_PATTERN}"
    echo "=== END DEBUG INFO ==="

  # Discover and Update All Cloud Run Services Using Unity Images
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'update-cloud-run-services'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Discovering Cloud Run services using Unity images..."
    echo "Looking for services using images matching: ${_REPO_PATTERN}"

    # Extract region from repo pattern and construct image URI
    TARGET_REGION=$$(echo "${_REPO_PATTERN}" | sed 's/-docker\.pkg\.dev.*//')
    NEW_IMAGE_URI="${_REPO_PATTERN}:${_COMMIT_SHA}"
    echo "Using region: $$TARGET_REGION"
    echo "New image URI: $$NEW_IMAGE_URI"
    echo "Project ID: ${PROJECT_ID}"

    # Debug: Show what gcloud thinks the current project is
    echo "=== GCLOUD DEBUG INFO ==="
    gcloud config list
    echo "Current gcloud project: $$(gcloud config get-value project)"
    echo "========================="

    gcloud config set project ${PROJECT_ID}
    echo "Set project to: ${PROJECT_ID}"

    # Test if the region is valid and accessible
    echo "Testing region access..."

    # First, verify the region exists
    echo "Checking if region $$TARGET_REGION is valid..."
    gcloud run regions list --filter="name:$$TARGET_REGION" --format="value(name)" | grep -q "$$TARGET_REGION" || {
      echo "âťŚ Region $$TARGET_REGION is not valid for Cloud Run"
      echo "Available Cloud Run regions:"
      gcloud run regions list --format="value(name)" | head -10
      exit 1
    }

    echo "âś… Region $$TARGET_REGION is valid"

    # Test Cloud Run access with a simpler command
    echo "Testing Cloud Run API access..."
    gcloud run services list --region=$$TARGET_REGION --limit=1 --format="value(metadata.name)" >/dev/null 2>&1 || {
      echo "âťŚ Cannot access Cloud Run services API in region $$TARGET_REGION"
      echo "This might be due to:"
      echo "  - Cloud Run API not enabled"
      echo "  - Insufficient permissions"
      echo "  - Region not available for your project"
      exit 1
    }

    echo "âś… Cloud Run API access successful"

    # Get all Cloud Run services that use Unity images (any version/tag)
    echo "Listing Cloud Run services in region $$TARGET_REGION..."
    echo "Searching for services using images from: ${_REPO_PATTERN}"

    # First, let's see all services in the region for debugging
    echo "All services in region:"
    gcloud run services list \
      --region=$$TARGET_REGION \
      --project=${PROJECT_ID} \
      --format="table(metadata.name,spec.template.spec.containers[0].image)"
    echo ""

    # Find services using any version of the Unity image (filter by base image path, not specific tag)
    UNITY_SERVICES=$$(gcloud run services list \
      --region=$$TARGET_REGION \
      --project=${PROJECT_ID} \
      --filter="spec.template.spec.containers[0].image:${_REPO_PATTERN}" \
      --format="value(metadata.name)")

    echo "Services found using Unity images:"
    if [ -n "$$UNITY_SERVICES" ]; then
      echo "$$UNITY_SERVICES"
      echo ""

      # Show current images for each Unity service
      echo "Current images for Unity services:"
      echo "$$UNITY_SERVICES" | while read -r SERVICE_NAME; do
        if [ -n "$$SERVICE_NAME" ]; then
          CURRENT_IMAGE=$$(gcloud run services describe "$$SERVICE_NAME" \
            --region=$$TARGET_REGION \
            --project=${PROJECT_ID} \
            --format="value(spec.template.spec.containers[0].image)")
          echo "  $$SERVICE_NAME: $$CURRENT_IMAGE"
        fi
      done
      echo ""
      echo "New image to deploy: $$NEW_IMAGE_URI"
    else
      echo "None found"
    fi

    if [ -z "$$UNITY_SERVICES" ]; then
      echo "No Cloud Run services found using Unity images"
      echo "Image pattern searched: ${_REPO_PATTERN}"
      echo ""
      echo "This might be normal if:"
      echo "  - No Unity services have been deployed yet"
      echo "  - Services are using a different image repository"
      echo "  - Services are in a different region"
      exit 0
    fi

    # COMMENTED OUT - Update each service with the new image
    echo "Found $$(echo "$$UNITY_SERVICES" | wc -l | tr -d ' ') Unity service(s) to update"
    echo "Would update to image: $$NEW_IMAGE_URI"
    echo ""
    echo "đź”Ť Discovery completed successfully! Update functionality is commented out for testing."

    echo "$$UNITY_SERVICES" | while read -r SERVICE_NAME; do
      if [ -n "$$SERVICE_NAME" ]; then
        echo "Updating service: $$SERVICE_NAME"

        # Get current image for comparison
        CURRENT_IMAGE=$$(gcloud run services describe "$$SERVICE_NAME" \
          --region=$$TARGET_REGION \
          --format="value(spec.template.spec.containers[0].image)")

        echo "  Current image: $$CURRENT_IMAGE"
        echo "  New image: $$NEW_IMAGE_URI"

        # Update the service with the new image
        gcloud run services update "$$SERVICE_NAME" \
          --image=$$NEW_IMAGE_URI \
          --region=$$TARGET_REGION \
          --quiet

        if [ $$? -eq 0 ]; then
          echo "âś… Successfully updated service: $$SERVICE_NAME"
        else
          echo "âťŚ Failed to update service: $$SERVICE_NAME"
          exit 1
        fi
      fi
    done

    echo ""
    echo "đźŽ‰ All Unity services updated successfully!"
    echo "Updated $$(echo "$$UNITY_SERVICES" | wc -l | tr -d ' ') service(s) to image: $$NEW_IMAGE_URI"

  # Verify Deployments and Show Updated Service Images
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'verify-deployments'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Verifying updated services..."

    # Extract region from repo pattern
    TARGET_REGION=$$(echo "${_REPO_PATTERN}" | sed 's/-docker\.pkg\.dev.*//')

    # Get updated services that use Unity images
    UNITY_SERVICES=$$(gcloud run services list \
      --region=$$TARGET_REGION \
      --project=${PROJECT_ID} \
      --filter="spec.template.spec.containers[0].image:${_REPO_PATTERN}" \
      --format="value(metadata.name)")

    echo "Verification - Current Unity service images:"
    if [ -n "$$UNITY_SERVICES" ]; then
      echo "$$UNITY_SERVICES" | while read -r SERVICE_NAME; do
        if [ -n "$$SERVICE_NAME" ]; then
          CURRENT_IMAGE=$$(gcloud run services describe "$$SERVICE_NAME" \
            --region=$$TARGET_REGION \
            --project=${PROJECT_ID} \
            --format="value(spec.template.spec.containers[0].image)")
          echo "  $$SERVICE_NAME: $$CURRENT_IMAGE"
        fi
      done

      # Check if all services are using the new image
      NEW_IMAGE_URI="${_REPO_PATTERN}:${_COMMIT_SHA}"
      OUTDATED_SERVICES=$$(echo "$$UNITY_SERVICES" | while read -r SERVICE_NAME; do
        if [ -n "$$SERVICE_NAME" ]; then
          CURRENT_IMAGE=$$(gcloud run services describe "$$SERVICE_NAME" \
            --region=$$TARGET_REGION \
            --project=${PROJECT_ID} \
            --format="value(spec.template.spec.containers[0].image)")
          if [ "$$CURRENT_IMAGE" != "$$NEW_IMAGE_URI" ]; then
            echo "$$SERVICE_NAME"
          fi
        fi
      done)

      if [ -z "$$OUTDATED_SERVICES" ]; then
        echo ""
        echo "âś… All Unity services successfully updated to: $$NEW_IMAGE_URI"
      else
        echo ""
        echo "âťŚ Some services were not updated properly:"
        echo "$$OUTDATED_SERVICES"
        exit 1
      fi
    else
      echo "No Unity services found during verification"
    fi
  waitFor: ['update-cloud-run-services']

# Substitution variables (these will be populated from the Pub/Sub message)
substitutions:
  _COMMIT_SHA: ''
  _REPO_PATTERN: ''

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout
timeout: '600s'  # 10 minutes
