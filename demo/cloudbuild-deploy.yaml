# Substitution variables (these will be populated from the Pub/Sub message)
substitutions:
  _COMMIT_SHA: ''
  _REPO_PATTERN: ''

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout
timeout: '600s'  # 10 minutes
