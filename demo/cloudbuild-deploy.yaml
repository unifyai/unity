# Substitution variables (these will be populated from the Pub/Sub message)
substitutions:
  _IMAGE_URI: ''
  _LATEST_URI: ''
  _COMMIT_SHA: ''
  _BUILD_ID: ''
  _PROJECT_ID: ''
  _REGION: ''
  _REPOSITORY: ''

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout
timeout: '600s'  # 10 minutes
