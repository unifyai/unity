steps:
  # Parse Pub/Sub Message and Log Deployment Info
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'parse-deployment-info'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "=== DEPLOYMENT DEBUG INFO ==="

    # Construct the full image URI from repo pattern and commit SHA
    NEW_IMAGE_URI="${_REPO_PATTERN}:${_COMMIT_SHA}"
    echo "Deployment triggered for image: $$NEW_IMAGE_URI"
    echo "Commit SHA: ${_COMMIT_SHA}"
    echo "Project ID: ${PROJECT_ID}"
    
    # Extract region from repo pattern (format: region-docker.pkg.dev/...)
    TARGET_REGION=$$(echo "${_REPO_PATTERN}" | cut -d'-' -f1)
    echo "Region (extracted): $$TARGET_REGION"
    echo "Repo Pattern: ${_REPO_PATTERN}"
    echo "=== END DEBUG INFO ==="

  # Discover and Update All Cloud Run Jobs Using Unity Images
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'update-cloud-run-jobs'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Discovering Cloud Run jobs using Unity images..."
    echo "Looking for jobs using images matching: ${_REPO_PATTERN}"

    # Extract region from repo pattern and construct image URI
    TARGET_REGION=$$(echo "${_REPO_PATTERN}" | cut -d'-' -f1)
    NEW_IMAGE_URI="${_REPO_PATTERN}:${_COMMIT_SHA}"
    echo "Using region: $$TARGET_REGION"
    echo "New image URI: $$NEW_IMAGE_URI"

    gcloud config set project ${PROJECT_ID}
    
    # Get all Cloud Run jobs and filter by image
    ALL_JOBS=$$(gcloud run jobs list \
      --format="json" \
      --region=$$TARGET_REGION \
      --project=${PROJECT_ID})
    
    # Use jq to filter jobs that use Unity images
    UNITY_JOBS=$$(echo "$$ALL_JOBS" | jq -r --arg pattern "${_REPO_PATTERN}" '
      .[] | 
      select(.spec.template.spec.template.spec.containers[0].image | startswith($$pattern)) |
      .metadata.name
    ')
    
    if [ -z "$$UNITY_JOBS" ]; then
      echo "No Cloud Run jobs found using Unity images"
      echo "Image pattern searched: ${_REPO_PATTERN}"
      echo ""
      echo "Available jobs in region:"
      gcloud run jobs list --region=$$TARGET_REGION --format="table(metadata.name,spec.template.spec.template.spec.containers[0].image)"
      exit 0
    fi
    
    echo "Found Unity-dependent jobs:"
    echo "$$UNITY_JOBS"
    echo ""

    echo "🎉 Job discovery completed successfully! (No actual updates performed)"
    
    # Update each job with the new image
    # echo "$$UNITY_JOBS" | while read -r JOB_NAME; do
    #   if [ -n "$$JOB_NAME" ]; then
    #     echo "Updating job: $$JOB_NAME"

    #     # Get current image for comparison
    #     CURRENT_IMAGE=$$(gcloud run jobs describe "$$JOB_NAME" \
    #       --region=$$TARGET_REGION \
    #       --format="value(spec.template.spec.template.spec.containers[0].image)")
        
    #     echo "  Current image: $$CURRENT_IMAGE"
    #     echo "  New image: $$NEW_IMAGE_URI"
        
    #     # COMMENTED OUT FOR TESTING - Update the job with the new image
    #     gcloud run jobs update "$$JOB_NAME" \
    #       --image=$$NEW_IMAGE_URI \
    #       --region=$$TARGET_REGION \
    #       --quiet
        
    #     if [ $$? -eq 0 ]; then
    #       echo "✅ Successfully updated job: $$JOB_NAME"
    #     else
    #       echo "❌ Failed to update job: $$JOB_NAME"
    #       exit 1
    #     fi
        
    #     echo "🔍 Would update job: $$JOB_NAME (update commented out for testing)"
    #   fi
    # done

  # Verify Deployments and Show Updated Job Images
