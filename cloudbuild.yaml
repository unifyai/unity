steps:
  # Build Docker Image
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-image'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    docker build --build-arg UNIFY_KEY=$$ORCHESTRA_API_KEY \
      -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity:${SHORT_SHA} \
      -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity:latest .
  secretEnv: ['ORCHESTRA_API_KEY']

  # Push Docker Image (SHA Tag)
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-sha-tag'
  args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity:${SHORT_SHA}']
  waitFor: ['build-image']

  # Push Docker Image (Latest Tag)
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-latest-tag'
  args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity:latest']
  waitFor: ['build-image']

  # Upload SHA to Cloud Storage
- name: 'gcr.io/cloud-builders/gsutil'
  id: 'upload-sha'
  script: |
    echo "${SHORT_SHA}" | gsutil cp - gs://${_BUCKET_NAME}/image_hash.txt
  waitFor: ['push-latest-tag']

# Substitution variables
substitutions:
  _REGION: 'us-central1'  # Change to your preferred region
  _REPOSITORY: 'unity'  # Change to your Artifact Registry repository name
  _BUCKET_NAME: 'unity-image-hash'  # Change to your GCS bucket name

# Available secrets
availableSecrets:
  secretManager:
  - versionName: projects/${PROJECT_ID}/secrets/ORCHESTRA_API_KEY/versions/latest
    env: 'ORCHESTRA_API_KEY'

# Options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'  # Use a more powerful machine for faster builds

# Timeout
timeout: '1200s'  # 20 minutes

# Images to be pushed (for Cloud Build history)
images:
- '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity:${SHORT_SHA}'
- '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/unity:latest'
