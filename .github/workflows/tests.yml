name: Testing Unity with uv

on: push

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y portaudio19-dev libnss3-dev libatk-bridge2.0-dev libdrm2 libxkbcommon0 libgtk-3-dev libgbm-dev
        # Install Playwright system dependencies for Ubuntu
        sudo apt-get install -y libasound2t64 libatspi2.0-0 libdrm2 libgtk-3-0 libnspr4 libnss3 libwayland-client0 libxcomposite1 libxdamage1 libxrandr2 xvfb

    - name: Install uv
      run: pip install uv

    - name: Create virtualenv and install deps
      run: |
        uv venv --python 3.11 .unity
        source .unity/bin/activate

        # 1) Create filtered requirements file
        grep -vE '^\s*-e\s+\.\./unify' requirements.txt > temp_requirements.txt

        # 2) Install all dependencies
        uv pip install -r temp_requirements.txt

        # 3) Install playwright browsers WITH system dependencies
        .unity/bin/python -m playwright install --with-deps

        # 4) Install unify package from GitHub
        uv pip install git+https://github.com/unifyai/unify

        # 5) cleanup
        rm temp_requirements.txt

    - name: Run black check
      run: .unity/bin/black --check .

  pytest:
    runs-on: ubuntu-latest
    environment: unity-testing
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y portaudio19-dev libnss3-dev libatk-bridge2.0-dev libdrm2 libxkbcommon0 libgtk-3-dev libgbm-dev
        # Install Playwright system dependencies for Ubuntu
        sudo apt-get install -y libasound2t64 libatspi2.0-0 libdrm2 libgtk-3-0 libnspr4 libnss3 libwayland-client0 libxcomposite1 libxdamage1 libxrandr2 xvfb

    - name: Install uv
      run: pip install uv

    - name: Create virtualenv and install deps
      run: |
        uv venv --python 3.11 .unity
        source .unity/bin/activate

        # 1) Create filtered requirements file
        grep -vE '^\s*-e\s+\.\./unify' requirements.txt > temp_requirements.txt

        # 2) Install all dependencies
        uv pip install -r temp_requirements.txt

        # 3) Install playwright browsers WITH system dependencies
        .unity/bin/python -m playwright install --with-deps

        # 4) Install the local 'unity' project in editable mode
        uv pip install -e .

        # 5) Install unify package from GitHub
        uv pip install git+https://github.com/unifyai/unify

        # 6) cleanup
        rm temp_requirements.txt


    - name: Run unit tests
      run: |
        source .unity/bin/activate
        echo "Cleaning all __pycache__ directories..."
        find . -type d -name "__pycache__" -exec rm -r {} +
        echo "Running tests..."
        .unity/bin/python -m pytest --timeout=120 -p no:warnings -vv .
      env:
        UNIFY_KEY: ${{ secrets.USER_API_KEY }}
        UNIFY_BASE_URL: https://api.unify.ai/v0
        UNIFY_CACHE: true
        UNIFY_TRACED: false
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        FIRST_NAME: Rick
        AGENT_FIRST: Rick
        AGENT_LAST: Morty
        AGENT_AGE: 29
