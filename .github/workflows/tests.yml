name: Testing Unity with uv

on: push

jobs:
  black:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Create virtualenv and install deps
        run: |
          uv venv --python 3.11 .unity
          source .unity/bin/activate
          uv pip install -r requirements.txt

      - name: Run black check
        run: .unity/bin/black --check .

  pytest:
    runs-on: ubuntu-latest
    environment: unity-testing
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Create virtualenv and install deps
        run: |
          uv venv --python 3.11 .unity
          source .unity/bin/activate
          uv pip install -r requirements.txt

      - name: Run unit tests
        run: .unity/bin/python -m pytest --timeout=120 -p no:warnings -vv .
        env:
          UNIFY_KEY: ${{ secrets.USER_API_KEY }}
